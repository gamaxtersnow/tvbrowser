<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翻页时钟 · 老黄历</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript@1.7.2/lunar.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-deep: #12100e;
            --bg-surface: #1c1915;
            --bg-card: #25221d;
            --bg-hover: #2e2a24;
            --accent: #b83c2f;
            --accent-dim: #8f2e24;
            --accent-glow: rgba(184, 60, 47, 0.2);
            --text-primary: #e8dcc8;
            --text-secondary: #9a9080;
            --text-muted: #5a5448;
            --border-subtle: rgba(232, 220, 200, 0.06);
            --border-accent: rgba(184, 60, 47, 0.35);
            --yi: #5a8a5a;
            --ji: #a04040;
            --gold: #c9a86c;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            width: 900px;
            height: 700px;
            background: radial-gradient(ellipse, rgba(184,60,47,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            padding: 16px 20px 20px;
            max-width: 640px;
            width: 100%;
            min-height: 100vh;
            justify-content: center;
        }

        /* ===== 天气栏 ===== */
        .weather-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 14px;
            color: var(--text-secondary);
            letter-spacing: 2px;
            opacity: 0;
            animation: fadeSlideDown 0.6s ease-out 0.1s forwards;
            min-height: 24px;
        }

        .weather-bar .weather-icon {
            font-size: 18px;
        }

        .weather-bar .weather-temp {
            color: var(--gold);
            font-family: 'Orbitron', monospace;
        }

        .weather-bar .divider {
            color: var(--text-muted);
        }

        /* ===== 农历标题 ===== */
        .lunar-header {
            text-align: center;
            opacity: 0;
            animation: fadeSlideDown 0.8s ease-out 0.3s forwards;
        }

        .lunar-header .lunar-big {
            font-size: 36px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 8px;
            margin-bottom: 4px;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .lunar-header .ganzhi-line {
            font-size: 13px;
            color: var(--text-secondary);
            letter-spacing: 5px;
        }

        /* ===== 翻页时钟 ===== */
        .clock-wrapper {
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.5s forwards;
        }

        .clock-container {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .digit-group {
            display: flex;
            gap: 8px;
        }

        .flip-unit {
            position: relative;
            width: 64px;
            height: 96px;
            perspective: 400px;
        }

        .flip-unit .upper-bg, .flip-unit .lower-bg,
        .flip-unit .flip-upper, .flip-unit .flip-lower {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: var(--bg-card);
            font-family: 'Orbitron', monospace;
            font-size: 56px;
            font-weight: 700;
            line-height: 96px;
            text-align: center;
            color: var(--text-primary);
            backface-visibility: hidden;
        }

        .flip-unit .upper-bg, .flip-unit .flip-upper {
            top: 0;
            border-radius: 6px 6px 0 0;
            border-bottom: 1.5px solid rgba(0,0,0,0.6);
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.04);
        }

        .flip-unit .lower-bg, .flip-unit .flip-lower {
            bottom: 0;
            border-radius: 0 0 6px 6px;
            border-top: 1.5px solid rgba(255,255,255,0.04);
            line-height: 0;
            box-shadow: inset 0 -2px 4px rgba(0,0,0,0.3);
        }

        .flip-unit .upper-bg { z-index: 1; }
        .flip-unit .lower-bg { z-index: 1; }

        .flip-unit .flip-upper {
            z-index: 3;
            transform-origin: bottom;
        }

        .flip-unit .flip-lower {
            z-index: 2;
            transform-origin: top;
            transform: rotateX(90deg);
        }

        .flip-unit.flipping .flip-upper {
            animation: flipTop 0.28s ease-in forwards;
        }

        .flip-unit.flipping .flip-lower {
            animation: flipBottom 0.28s ease-out 0.28s forwards;
        }

        @keyframes flipTop {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        @keyframes flipBottom {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        .flip-unit::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 8px;
            background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.4) 100%);
            z-index: -1;
            pointer-events: none;
        }

        .flip-unit::after {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 7px;
            border: 1px solid var(--border-subtle);
            pointer-events: none;
            z-index: 4;
        }

        .separator {
            font-family: 'Orbitron', monospace;
            font-size: 44px;
            font-weight: 700;
            color: var(--gold);
            line-height: 96px;
            animation: blink 1s step-end infinite;
            text-shadow: 0 0 20px rgba(201, 168, 108, 0.2);
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        /* ===== 月历 ===== */
        .calendar-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 14px 18px;
            width: 100%;
            max-width: 420px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 0.8s forwards;
        }

        .calendar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .calendar-header .nav-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border-subtle);
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .calendar-header .nav-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
            border-color: var(--border-accent);
        }

        .calendar-header .calendar-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 3px;
            font-family: 'Noto Serif SC', serif;
        }

        .weekday-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            margin-bottom: 6px;
        }

        .weekday-header span {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            padding: 4px 0;
            letter-spacing: 1px;
        }

        .days-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            font-size: 13px;
            color: var(--text-primary);
            cursor: default;
            position: relative;
            transition: all 0.15s;
            min-height: 32px;
        }

        .day-cell.current-month.clickable {
            cursor: pointer;
        }

        .day-cell.current-month.clickable:hover:not(.selected) {
            background: var(--bg-hover);
        }

        .day-cell.prev-month,
        .day-cell.next-month {
            color: var(--text-muted);
        }

        .day-cell.prev-month.clickable {
            cursor: pointer;
        }

        .day-cell.prev-month.clickable:hover:not(.selected) {
            background: var(--bg-hover);
        }

        .day-cell.today {
            color: var(--accent);
            font-weight: 600;
        }

        .day-cell.today::after {
            content: '';
            position: absolute;
            bottom: 4px;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--accent);
        }

        .day-cell.selected {
            background: var(--accent) !important;
            color: #fff !important;
            font-weight: 600;
        }

        .day-cell.selected::after {
            display: none;
        }

        .day-cell.future {
            color: var(--text-muted);
            opacity: 0.4;
            pointer-events: none;
        }

        /* ===== 公历日期标签 ===== */
        .solar-date {
            text-align: center;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 1.0s forwards;
        }

        .solar-date .date-main {
            font-size: 16px;
            color: var(--text-secondary);
            letter-spacing: 3px;
        }

        .solar-date .date-main .weekday {
            color: var(--gold);
            margin-left: 8px;
        }

        /* ===== 老黄历 ===== */
        .almanac-section {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 16px;
            padding: 16px 24px;
            width: 100%;
            max-width: 420px;
            opacity: 0;
            animation: fadeSlideUp 0.8s ease-out 1.2s forwards;
            position: relative;
            overflow: hidden;
        }

        .almanac-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-accent), transparent);
        }

        .selected-date-label {
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
            letter-spacing: 3px;
        }

        .almanac-content {
            display: flex;
            gap: 32px;
            justify-content: center;
        }

        .almanac-col {
            flex: 1;
            max-width: 180px;
        }

        .almanac-col .label {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 2px;
        }

        .almanac-col .label .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
        }

        .almanac-col.yi .label .dot { background: var(--yi); box-shadow: 0 0 6px rgba(90,138,90,0.4); }
        .almanac-col.ji .label .dot { background: var(--ji); box-shadow: 0 0 6px rgba(160,64,64,0.4); }

        .almanac-col .items {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            letter-spacing: 1px;
        }

        .solar-term {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 3px;
        }

        /* ===== 入场动画 ===== */
        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeSlideDown {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ===== 悬浮框 ===== */
        .tooltip {
            position: fixed;
            top: 0;
            left: 0;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 16px 20px;
            min-width: 320px;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,0,0,0.3);
            z-index: 100;
            opacity: 0;
            transform: scale(0.92) translateY(8px);
            pointer-events: none;
            transition: all 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            visibility: hidden;
        }

        .tooltip.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
            visibility: visible;
        }

        .tooltip::before {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 10px;
            height: 10px;
            background: var(--bg-surface);
            border-right: 1px solid var(--border-subtle);
            border-bottom: 1px solid var(--border-subtle);
        }

        .tooltip.tooltip-below::before {
            bottom: auto;
            top: -6px;
            border: none;
            border-left: 1px solid var(--border-subtle);
            border-top: 1px solid var(--border-subtle);
        }

        .tooltip-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .tooltip-date {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: 1px;
        }

        .tooltip-close {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            line-height: 1;
            padding: 0;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.15s;
        }

        .tooltip-close:hover {
            color: var(--text-primary);
            background: var(--bg-hover);
        }

        .tooltip-lunar {
            font-size: 14px;
            color: var(--accent);
            margin-bottom: 2px;
            font-weight: 600;
        }

        .tooltip-ganzhi {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .tooltip-yiji {
            display: flex;
            gap: 16px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 10px;
        }

        .yiji-col {
            flex: 1;
        }

        .yiji-label {
            font-size: 11px;
            padding: 1px 6px;
            border-radius: 3px;
            margin-right: 4px;
            display: inline-block;
            font-weight: 600;
        }

        .yiji-label.yi { background: rgba(90,138,90,0.15); color: var(--yi); }
        .yiji-label.ji { background: rgba(160,64,64,0.15); color: var(--ji); }

        .yiji-text {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.7;
            display: block;
            margin-top: 4px;
        }

        .tooltip-term {
            margin-top: 8px;
            font-size: 11px;
            color: var(--gold);
            letter-spacing: 1px;
            border-top: 1px solid var(--border-subtle);
            padding-top: 8px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            .container { gap: 10px; padding: 12px 16px 16px; }
            .lunar-header .lunar-big { font-size: 28px; letter-spacing: 4px; }
            .flip-unit { width: 48px; height: 72px; }
            .flip-unit .upper-bg, .flip-unit .lower-bg,
            .flip-unit .flip-upper, .flip-unit .flip-lower {
                font-size: 40px;
                line-height: 72px;
            }
            .flip-unit .lower-bg, .flip-unit .flip-lower { line-height: 0; }
            .separator { font-size: 30px; line-height: 72px; }
            .calendar-section { padding: 10px 12px; max-width: 340px; }
            .day-cell { font-size: 12px; min-height: 28px; }
            .almanac-section { padding: 12px 16px; max-width: 340px; }
            .almanac-content { gap: 20px; }
            .clock-container { gap: 8px; }
            .digit-group { gap: 4px; }
            .tooltip { min-width: 220px; padding: 12px 16px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 天气 -->
        <div class="weather-bar" id="weather-bar">
            <span id="weather-city">定位中...</span>
            <span class="divider">·</span>
            <span class="weather-icon" id="weather-icon"></span>
            <span class="weather-temp" id="weather-temp"></span>
        </div>

        <!-- 农历标题 -->
        <div class="lunar-header">
            <div class="lunar-big" id="lunar-date">--</div>
            <div class="ganzhi-line" id="ganzhi">--</div>
        </div>

        <!-- 翻页时钟 -->
        <div class="clock-wrapper">
            <div class="clock-container">
                <div class="digit-group" id="hours">
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="digit-group" id="minutes">
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                </div>
                <div class="separator">:</div>
                <div class="digit-group" id="seconds">
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                    <div class="flip-unit" data-val="0">
                        <div class="upper-bg">0</div>
                        <div class="lower-bg">0</div>
                        <div class="flip-upper">0</div>
                        <div class="flip-lower">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 公历日期 -->
        <div class="solar-date">
            <div class="date-main">
                <span id="date-text">--月--日</span>
                <span class="weekday" id="weekday">星期-</span>
            </div>
        </div>

        <!-- 月历 -->
        <div class="calendar-section">
            <div class="calendar-header">
                <button class="nav-btn" id="prev-month">&#8249;</button>
                <span class="calendar-title" id="calendar-title">----年--月</span>
                <button class="nav-btn" id="next-month">&#8250;</button>
            </div>
            <div class="weekday-header">
                <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
            </div>
            <div class="days-grid" id="days-grid"></div>
        </div>

        <!-- 老黄历 -->
        <div class="almanac-section">
            <div class="selected-date-label" id="selected-date-label">今日宜忌</div>
            <div class="almanac-content">
                <div class="almanac-col yi">
                    <div class="label"><span class="dot"></span>宜</div>
                    <div class="items" id="yi-items">-</div>
                </div>
                <div class="almanac-col ji">
                    <div class="label"><span class="dot"></span>忌</div>
                    <div class="items" id="ji-items">-</div>
                </div>
            </div>
            <div class="solar-term" id="solar-term"></div>
        </div>
    </div>

    <!-- 日期悬浮框 -->
    <div class="tooltip" id="date-tooltip">
        <div class="tooltip-header">
            <span class="tooltip-date" id="tooltip-date"></span>
            <button class="tooltip-close" id="tooltip-close">×</button>
        </div>
        <div class="tooltip-lunar" id="tooltip-lunar"></div>
        <div class="tooltip-ganzhi" id="tooltip-ganzhi"></div>
        <div class="tooltip-yiji">
            <div class="yiji-col">
                <span class="yiji-label yi">宜</span>
                <span class="yiji-text" id="tooltip-yi"></span>
            </div>
            <div class="yiji-col">
                <span class="yiji-label ji">忌</span>
                <span class="yiji-text" id="tooltip-ji"></span>
            </div>
        </div>
        <div class="tooltip-term" id="tooltip-term"></div>
    </div>

    <script>
        const LunarData = {
            tianGan: ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'],
            diZhi: ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'],
            shengXiao: ['鼠','牛','虎','兔','龙','蛇','马','羊','猴','鸡','狗','猪'],
            monthNames: ['正','二','三','四','五','六','七','八','九','十','冬','腊'],
            dayNames: [
                '初一','初二','初三','初四','初五','初六','初七','初八','初九','初十',
                '十一','十二','十三','十四','十五','十六','十七','十八','十九','二十',
                '廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'
            ],
            weekdays: ['日','一','二','三','四','五','六'],
        };

        const yiJiData = {
            yi: [
                '嫁娶 祭祀 祈福 出行 动土',
                '开市 交易 立券 纳财 栽种',
                '安床 拆卸 修造 入殓 移柩',
                '订盟 纳采 会亲友 入学 沐浴',
                '裁衣 作灶 扫舍 安葬 启钻',
                '求医 治病 开光 塑绘 谢土',
                '斋醮 出行 嫁娶 移徙 入宅',
            ],
            ji: [
                '入宅 移徙 出火 分居 安香',
                '动土 破土 安葬 行丧 探病',
                '嫁娶 开市 交易 立券 出行',
                '安葬 行丧 词讼 出火 开市',
                '开仓 出货财 伐木 纳畜 上梁',
                '安门 作灶 安葬 破土 纳采',
                '开市 破土 置产 安床 出行',
            ]
        };

        const weatherMap = {
            0: { text: '晴', icon: '☀️' },
            1: { text: '多云', icon: '⛅' },
            2: { text: '多云', icon: '⛅' },
            3: { text: '阴', icon: '☁️' },
            45: { text: '雾', icon: '🌫️' },
            48: { text: '雾凇', icon: '🌫️' },
            51: { text: '毛毛雨', icon: '🌦️' },
            53: { text: '毛毛雨', icon: '🌦️' },
            55: { text: '毛毛雨', icon: '🌦️' },
            61: { text: '小雨', icon: '🌧️' },
            63: { text: '中雨', icon: '🌧️' },
            65: { text: '大雨', icon: '🌧️' },
            71: { text: '小雪', icon: '🌨️' },
            73: { text: '中雪', icon: '🌨️' },
            75: { text: '大雪', icon: '🌨️' },
            80: { text: '阵雨', icon: '🌦️' },
            81: { text: '阵雨', icon: '🌦️' },
            82: { text: '阵雨', icon: '🌦️' },
            95: { text: '雷雨', icon: '⛈️' },
            96: { text: '雷雨', icon: '⛈️' },
            99: { text: '雷雨', icon: '⛈️' },
        };

        let calendarYear, calendarMonth;
        let selectedDate = null;

        function getGanZhiYear(year) {
            const gan = LunarData.tianGan[(year - 4) % 10];
            const zhi = LunarData.diZhi[(year - 4) % 12];
            return gan + zhi;
        }

        function getGanZhiMonth(year, month) {
            const gan = LunarData.tianGan[(year * 12 + month + 12) % 10];
            const zhi = LunarData.diZhi[(month + 2) % 12];
            return gan + zhi;
        }

        function getGanZhiDay(date) {
            const base = new Date(1900, 0, 31);
            const diff = Math.floor((date - base) / 86400000);
            const gan = LunarData.tianGan[diff % 10];
            const zhi = LunarData.diZhi[diff % 12];
            return gan + zhi;
        }

        function getLunarInfo(date) {
            if (typeof Lunar !== 'undefined') {
                try {
                    const solar = Solar.fromYmd(date.getFullYear(), date.getMonth() + 1, date.getDate());
                    const lunar = solar.getLunar();
                    return {
                        year: lunar.getYearInGanZhi() + '年',
                        month: lunar.getMonthInGanZhi() + '月',
                        day: lunar.getDayInGanZhi() + '日',
                        lunarMonth: (lunar.getMonth() < 0 ? '闰' : '') + LunarData.monthNames[Math.abs(lunar.getMonth()) - 1] + '月',
                        lunarDay: LunarData.dayNames[lunar.getDay() - 1],
                        shengxiao: lunar.getYearShengXiao(),
                        yi: lunar.getDayYi().join(' '),
                        ji: lunar.getDayJi().join(' '),
                        jieQi: solar.getJieQi() || ''
                    };
                } catch(e) {}
            }
            const idx = (date.getDate() + date.getMonth()) % 7;
            return {
                year: getGanZhiYear(date.getFullYear()) + '年',
                month: getGanZhiMonth(date.getFullYear(), date.getMonth() + 1) + '月',
                day: getGanZhiDay(date) + '日',
                lunarMonth: LunarData.monthNames[date.getMonth()] + '月',
                lunarDay: LunarData.dayNames[date.getDate() - 1] || '初一',
                shengxiao: LunarData.shengXiao[(date.getFullYear() - 4) % 12],
                yi: yiJiData.yi[idx],
                ji: yiJiData.ji[idx],
                jieQi: ''
            };
        }

        // ===== 天气 =====
        async function fetchWeather() {
            try {
                const posRes = await fetch('https://ipapi.co/json/');
                const pos = await posRes.json();
                const lat = pos.latitude;
                const lon = pos.longitude;
                const city = pos.city;

                const weatherRes = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code&timezone=auto`
                );
                const weather = await weatherRes.json();
                const current = weather.current;
                const code = current.weather_code;
                const temp = Math.round(current.temperature_2m);
                const info = weatherMap[code] || { text: '未知', icon: '❓' };

                document.getElementById('weather-city').textContent = city;
                document.getElementById('weather-icon').textContent = `${info.icon} ${info.text}`;
                document.getElementById('weather-temp').textContent = `${temp}°C`;
            } catch (e) {
                document.getElementById('weather-bar').style.display = 'none';
            }
        }

        // ===== 翻页时钟 =====
        function flipDigit(unit, newVal) {
            const current = unit.dataset.val;
            if (current === String(newVal)) return;
            if (unit.classList.contains('flipping')) return;

            const upperBg = unit.querySelector('.upper-bg');
            const lowerBg = unit.querySelector('.lower-bg');
            const flipUpper = unit.querySelector('.flip-upper');
            const flipLower = unit.querySelector('.flip-lower');

            upperBg.textContent = newVal;
            flipUpper.textContent = current;
            flipLower.textContent = newVal;

            unit.classList.add('flipping');

            const onEnd = (e) => {
                if (e.animationName !== 'flipBottom') return;
                lowerBg.textContent = newVal;
                unit.dataset.val = newVal;
                flipUpper.textContent = newVal;
                flipLower.textContent = newVal;
                unit.classList.remove('flipping');
                flipLower.removeEventListener('animationend', onEnd);
            };
            flipLower.addEventListener('animationend', onEnd);
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            const hours = document.getElementById('hours').children;
            const minutes = document.getElementById('minutes').children;
            const seconds = document.getElementById('seconds').children;

            flipDigit(hours[0], h[0]);
            flipDigit(hours[1], h[1]);
            flipDigit(minutes[0], m[0]);
            flipDigit(minutes[1], m[1]);
            flipDigit(seconds[0], s[0]);
            flipDigit(seconds[1], s[1]);
        }

        // ===== 月历 =====
        function isSameDay(d1, d2) {
            return d1.getFullYear() === d2.getFullYear() &&
                   d1.getMonth() === d2.getMonth() &&
                   d1.getDate() === d2.getDate();
        }

        function isFutureDate(date) {
            const today = new Date();
            today.setHours(23, 59, 59, 999);
            return date > today;
        }

        function isPastDate(date) {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return date < today;
        }

        function renderCalendar(year, month) {
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();
            const startOffset = (firstDay + 6) % 7; // Monday-first

            const today = new Date();
            const grid = document.getElementById('days-grid');
            let html = '';

            // Previous month padding
            for (let i = 0; i < startOffset; i++) {
                const d = daysInPrevMonth - startOffset + 1 + i;
                const date = new Date(year, month - 1, d);
                html += renderDayCell(date, 'prev-month');
            }

            // Current month
            for (let d = 1; d <= daysInMonth; d++) {
                const date = new Date(year, month, d);
                html += renderDayCell(date, 'current-month');
            }

            // Next month padding
            const filled = startOffset + daysInMonth;
            const rows = Math.ceil(filled / 7);
            const totalCells = rows * 7;
            const remaining = totalCells - filled;
            for (let d = 1; d <= remaining; d++) {
                const date = new Date(year, month + 1, d);
                html += renderDayCell(date, 'next-month');
            }

            grid.innerHTML = html;

            // Update title
            document.getElementById('calendar-title').textContent = `${year}年${month + 1}月`;

            // Bind click events
            grid.querySelectorAll('.day-cell.current-month, .day-cell.prev-month.clickable').forEach(cell => {
                cell.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const y = parseInt(cell.dataset.year);
                    const m = parseInt(cell.dataset.month);
                    const d = parseInt(cell.dataset.day);
                    const date = new Date(y, m, d);
                    selectedDate = date;
                    showTooltip(date, cell);
                    renderCalendar(calendarYear, calendarMonth);
                });
            });
        }

        function renderDayCell(date, type) {
            const y = date.getFullYear();
            const m = date.getMonth();
            const d = date.getDate();

            const today = new Date();
            const isToday = isSameDay(date, today);
            const isSelected = selectedDate && isSameDay(date, selectedDate);
            const isFuture = isFutureDate(date);
            const isPast = isPastDate(date);
            const clickable = (type === 'current-month' || (type === 'prev-month' && isPast)) && !isFuture;

            let classes = ['day-cell', type];
            if (isToday) classes.push('today');
            if (isSelected) classes.push('selected');
            if (isFuture) classes.push('future');
            if (clickable) classes.push('clickable');

            return `<div class="${classes.join(' ')}" data-year="${y}" data-month="${m}" data-day="${d}">${d}</div>`;
        }

        function updateAlmanacForDate(date) {
            const lunar = getLunarInfo(date);
            const today = new Date();
            const isToday = isSameDay(date, today);

            // 底部区域固定显示今日宜忌，不随点击切换
            if (isToday) {
                document.getElementById('selected-date-label').textContent = '今日宜忌';
                document.getElementById('yi-items').textContent = lunar.yi || '-';
                document.getElementById('ji-items').textContent = lunar.ji || '-';

                const termEl = document.getElementById('solar-term');
                if (lunar.jieQi) {
                    termEl.textContent = `今日节气：${lunar.jieQi}`;
                    termEl.style.display = 'block';
                } else {
                    termEl.style.display = 'none';
                }

                document.getElementById('lunar-date').textContent = lunar.lunarMonth + lunar.lunarDay;
                document.getElementById('ganzhi').textContent = `${lunar.year} · ${lunar.month} · ${lunar.day} · ${lunar.shengxiao}年`;
                document.getElementById('date-text').textContent = `${date.getMonth() + 1}月${date.getDate()}日`;
                document.getElementById('weekday').textContent = `星期${LunarData.weekdays[date.getDay()]}`;
            }
        }

        // ===== 悬浮框 =====
        function showTooltip(date, targetEl) {
            const lunar = getLunarInfo(date);
            const tooltip = document.getElementById('date-tooltip');

            document.getElementById('tooltip-date').textContent = `${date.getMonth() + 1}月${date.getDate()}日`;
            document.getElementById('tooltip-lunar').textContent = `${lunar.lunarMonth}${lunar.lunarDay}`;
            document.getElementById('tooltip-ganzhi').textContent = `${lunar.year} ${lunar.month} ${lunar.day}`;
            document.getElementById('tooltip-yi').textContent = lunar.yi || '-';
            document.getElementById('tooltip-ji').textContent = lunar.ji || '-';

            const termEl = document.getElementById('tooltip-term');
            if (lunar.jieQi) {
                termEl.textContent = `节气：${lunar.jieQi}`;
                termEl.style.display = 'block';
            } else {
                termEl.style.display = 'none';
            }

            const rect = targetEl.getBoundingClientRect();
            const tw = 320;
            const th = 170;

            let top = rect.top - th - 12;
            let left = rect.left + rect.width / 2 - tw / 2;

            if (top < 10) {
                top = rect.bottom + 12;
                tooltip.classList.add('tooltip-below');
            } else {
                tooltip.classList.remove('tooltip-below');
            }
            if (left < 10) left = 10;
            if (left + tw > window.innerWidth - 10) {
                left = window.innerWidth - tw - 10;
            }

            tooltip.style.top = `${top}px`;
            tooltip.style.left = `${left}px`;
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('date-tooltip').classList.remove('visible');
        }

        // ===== 初始化 =====
        function init() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');

            const setInit = (group, vals) => {
                const units = group.children;
                for (let i = 0; i < 2; i++) {
                    const u = units[i];
                    const v = vals[i];
                    u.dataset.val = v;
                    u.querySelector('.upper-bg').textContent = v;
                    u.querySelector('.lower-bg').textContent = v;
                    u.querySelector('.flip-upper').textContent = v;
                    u.querySelector('.flip-lower').textContent = v;
                }
            };

            setInit(document.getElementById('hours'), h);
            setInit(document.getElementById('minutes'), m);
            setInit(document.getElementById('seconds'), s);

            // Calendar
            calendarYear = now.getFullYear();
            calendarMonth = now.getMonth();
            selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            renderCalendar(calendarYear, calendarMonth);
            updateAlmanacForDate(selectedDate);

            // Month navigation
            document.getElementById('prev-month').addEventListener('click', () => {
                calendarMonth--;
                if (calendarMonth < 0) { calendarMonth = 11; calendarYear--; }
                renderCalendar(calendarYear, calendarMonth);
            });

            document.getElementById('next-month').addEventListener('click', () => {
                calendarMonth++;
                if (calendarMonth > 11) { calendarMonth = 0; calendarYear++; }
                renderCalendar(calendarYear, calendarMonth);
            });

            // Tooltip close handlers
            document.getElementById('tooltip-close').addEventListener('click', hideTooltip);
            document.addEventListener('click', (e) => {
                const tooltip = document.getElementById('date-tooltip');
                if (tooltip.classList.contains('visible') && !tooltip.contains(e.target)) {
                    hideTooltip();
                }
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') hideTooltip();
            });
        }

        init();
        fetchWeather();

        // 精确对时：递归 setTimeout 对齐秒边界，避免漂移
        function scheduleNextTick() {
            const delay = 1000 - (Date.now() % 1000);
            setTimeout(() => {
                updateClock();
                scheduleNextTick();
            }, delay);
        }
        scheduleNextTick();
    </script>
